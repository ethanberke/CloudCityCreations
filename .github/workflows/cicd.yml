name: CICD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0

      # ---------- FRONTEND ----------
      - name: Install frontend dependencies
        working-directory: ./client
        run: npm ci

      - name: Run ESLint (frontend)
        working-directory: ./client
        run: npm run lint

      - name: Run Prettier check (frontend)
        working-directory: ./client
        run: npm run prettier . --check

      # ---------- BACKEND ----------
      - name: Install backend dependencies
        working-directory: ./server
        run: npm ci

      - name: Run ESLint (backend)
        working-directory: ./server
        run: npm run lint

      - name: Run Prettier check (backend)
        working-directory: ./server
        run: npm run prettier . --check


  # ---------- DOCKER BUILD ----------
  docker:
    runs-on: ubuntu-latest

    needs: lint #This guarantees docker build only runs if lint passes

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cloudcitycreations-client:latest

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cloudcitycreations-server:latest
